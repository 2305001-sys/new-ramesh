<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop Prototype</title>
    <style>
        :root {
            --primary-green: #28a745;
            --border-color: #ddd;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; padding: 40px; color: #333; }
        
        /* Layout Grid */
        .product-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        /* Cards */
        .card { 
            background: white; border: 1px solid var(--border-color); 
            padding: 20px; width: 220px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .section-box { max-width: 400px; margin: 30px auto; background: white; border: 1px solid var(--border-color); padding: 25px; }

        /* Buttons */
        .btn { 
            background: var(--primary-green); color: white; border: none; 
            padding: 10px 15px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 3px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-cancel { background: #6c757d; margin-top: 10px; }

        /* Payment Form */
        input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .hidden { display: none; }
        .hint { font-size: 12px; color: #666; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <!-- 1. Product Selection -->
    <div class="product-grid">
        <div class="card">
            <h3>Smart Watch</h3>
            <p>₹2500</p>
            <button class="btn" onclick="addToCart('Smart Watch', 2500)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Bluetooth Speaker</h3>
            <p>₹1800</p>
            <button class="btn" onclick="addToCart('Bluetooth Speaker', 1800)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Wireless Earbuds</h3>
            <p>₹3200</p>
            <button class="btn" onclick="addToCart('Wireless Earbuds', 3200)">Add to Cart</button>
        </div>
    </div>

    <!-- 2. Shopping Cart Display -->
    <div class="section-box" id="cart-ui">
        <h2>Shopping Cart</h2>
        <div id="items-list" style="text-align: left; margin-bottom: 15px;">
            <p style="color: #888;">Your cart is empty.</p>
        </div>
        <hr>
        <p><strong>Total: ₹<span id="total-val">0</span></strong></p>
        <button class="btn" onclick="openGateway()">Buy Now</button>
    </div>

    <!-- 3. Payment Gateway Overlay -->
    <div class="section-box hidden" id="gateway-ui">
        <h3>Dummy Payment Gateway</h3>
        <p>Amount to Pay: <strong>₹<span id="pay-amt">0</span></strong></p>
        <input type="text" id="card-input" placeholder="0000 0000 0000 0000" maxlength="16">
        <button class="btn" onclick="validatePay()">Pay Now</button>
        <button class="btn btn-cancel" onclick="closeGateway()">Cancel</button>
        
        <div class="hint">
            <strong>Testing Credentials:</strong><br>
            - Success: 1111111111111111<br>
            - Failure: 2222222222222222
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('items-list');
            total = cart.reduce((sum, item) => sum + item.price, 0);
            
            list.innerHTML = cart.map(item => `<div>• ${item.name} - ₹${item.price}</div>`).join('');
            document.getElementById('total-val').innerText = total;
            if(cart.length === 0) list.innerHTML = '<p style="color: #888;">Your cart is empty.</p>';
        }

        function openGateway() {
            if(total === 0) return alert("Add items first!");
            document.getElementById('pay-amt').innerText = total;
            document.getElementById('gateway-ui').classList.remove('hidden');
            document.getElementById('cart-ui').classList.add('hidden');
        }

        function closeGateway() {
            document.getElementById('gateway-ui').classList.add('hidden');
            document.getElementById('cart-ui').classList.remove('hidden');
        }

        function validatePay() {
            const val = document.getElementById('card-input').value;
            if(val === "1111111111111111") {
                alert("✅ Payment Successful! Order Placed.");
                cart = []; 
                updateUI();
                closeGateway();
            } else if(val === "2222222222222222") {
                alert("❌ Payment Failed. Please check your card details.");
            } else {
                alert("Please enter a valid 16-digit dummy card.");
            }
        }
    </script>
</body>
</html>
